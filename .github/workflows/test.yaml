name: Test
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest
      - uses: azure/setup-helm@v5
      - run: helm lint charts/kubevoip
      - run: helm template kubevoip charts/kubevoip >/dev/null
      - name: Validate CRD on Kubernetes
        uses: helm/kind-action@v1
      - run: kubectl apply --dry-run=server -f config/crd/asterisk-crd.yaml
  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: kubevoip:test
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: kubevoip-asterisk:test
