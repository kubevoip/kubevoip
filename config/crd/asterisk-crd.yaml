apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: asterisks.kubevoip.io
spec:
  group: kubevoip.io
  scope: Namespaced
  names:
    plural: asterisks
    singular: asterisk
    kind: Asterisk
    shortNames: [ast]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                  minLength: 1
                service:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [ClusterIP, NodePort, LoadBalancer]
                      default: ClusterIP
                sip:
                  type: object
                  properties:
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      default: 5060
                rtp:
                  type: object
                  properties:
                    start:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      default: 10000
                    end:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      default: 10100
                endpoints:
                  type: array
                  default: []
                  items:
                    type: object
                    required: [name, extension, passwordSecretRef]
                    properties:
                      name:
                        type: string
                        maxLength: 40
                        pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
                      extension:
                        type: string
                        maxLength: 20
                        pattern: "^[0-9]+$"
                      callerId:
                        type: string
                        maxLength: 80
                      passwordSecretRef:
                        type: object
                        required: [name, key]
                        properties:
                          name:
                            type: string
                            minLength: 1
                          key:
                            type: string
                            minLength: 1
                dialplan:
                  type: object
                  properties:
                    echoExtension:
                      type: string
                      pattern: "^[0-9]+$"
                      default: "600"
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
