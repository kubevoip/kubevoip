name: Integration
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  echo-call:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          load: true
          tags: kubevoip:test
          cache-from: type=gha,scope=integration-kubevoip
          cache-to: type=gha,scope=integration-kubevoip,mode=max
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: runtime/Dockerfile
          load: true
          tags: kubevoip-asterisk:test
          cache-from: type=gha,scope=integration-asterisk
          cache-to: type=gha,scope=integration-asterisk,mode=max
      - run: docker tag kubevoip-asterisk:test kubevoip-asterisk-worker:test
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: runtime/kamailio/Dockerfile
          load: true
          tags: kubevoip-kamailio:test
          cache-from: type=gha,scope=integration-kamailio
          cache-to: type=gha,scope=integration-kamailio,mode=max
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: runtime/rtpengine/Dockerfile
          load: true
          tags: kubevoip-rtpengine:test
          cache-from: type=gha,scope=integration-rtpengine
          cache-to: type=gha,scope=integration-rtpengine,mode=max
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: integration/Dockerfile.sipp
          load: true
          tags: kubevoip-sipp:test
          cache-from: type=gha,scope=integration-sipp
          cache-to: type=gha,scope=integration-sipp,mode=max
      - uses: helm/kind-action@v1
        with:
          cluster_name: kind
      - run: kind load docker-image kubevoip:test kubevoip-asterisk:test kubevoip-asterisk-worker:test kubevoip-kamailio:test kubevoip-rtpengine:test kubevoip-sipp:test
      - uses: azure/setup-helm@v5
      - run: |
          kubectl apply -f examples/namespace.yaml
          kubectl create namespace kubevoip-platform
          for namespace in asterisk-demo kubevoip-platform; do
            helm install kubevoip charts/kubevoip \
              --namespace "${namespace}" \
              --set image.repository=kubevoip --set image.tag=test \
              --set asteriskImage.repository=kubevoip-asterisk --set asteriskImage.tag=test \
              --set asteriskWorkerImage.repository=kubevoip-asterisk-worker --set asteriskWorkerImage.tag=test \
              --set kamailioImage.repository=kubevoip-kamailio --set kamailioImage.tag=test \
              --set rtpengineImage.repository=kubevoip-rtpengine --set rtpengineImage.tag=test
          done
      - name: Verify namespace-scoped Secret access
        run: |
          kubectl -n asterisk-demo create secret generic isolation-check --from-literal=value=private
          kubectl auth can-i get secret/isolation-check \
            --as=system:serviceaccount:asterisk-demo:kubevoip-kubevoip \
            --namespace=asterisk-demo
          test "$(kubectl auth can-i get secret/isolation-check \
            --as=system:serviceaccount:kubevoip-platform:kubevoip-kubevoip \
            --namespace=asterisk-demo)" = "no"
          test "$(kubectl auth can-i list secrets \
            --as=system:serviceaccount:asterisk-demo:kubevoip-kubevoip \
            --all-namespaces)" = "no"
          if kubectl get clusterrole -o yaml | grep -A20 'name: kubevoip' | grep -q 'secrets'; then
            echo "KubeVoIP ClusterRoles must not grant Secret access"
            exit 1
          fi
          kubectl -n asterisk-demo delete secret isolation-check
      - run: kubectl apply -f examples/secret-alice-sip.yaml -f examples/asterisk-demo.yaml
      - run: |
          kubectl -n asterisk-demo wait --for=create statefulset/demo-asterisk --timeout=60s
          kubectl -n asterisk-demo wait --for=condition=Ready pod -l app.kubernetes.io/name=asterisk --timeout=180s
      - name: Complete authenticated echo call
        run: |
          kubectl -n asterisk-demo create configmap sipp-scenario --from-file=integration/sipp-echo.xml
          kubectl -n asterisk-demo run sipp --restart=Never --image=kubevoip-sipp:test \
            --overrides='{"spec":{"containers":[{"name":"sipp","image":"kubevoip-sipp:test","imagePullPolicy":"IfNotPresent","args":["-sf","/scenario/sipp-echo.xml","-s","600","demo-asterisk","-m","1","-timeout","20s"],"volumeMounts":[{"name":"scenario","mountPath":"/scenario"}]}],"volumes":[{"name":"scenario","configMap":{"name":"sipp-scenario"}}]}}'
          kubectl -n asterisk-demo wait --for=jsonpath='{.status.phase}'=Succeeded pod/sipp --timeout=60s
      - name: Rotate credentials and verify rollout hash
        run: |
          before="$(kubectl -n asterisk-demo get ast demo -o jsonpath='{.status.configHash}')"
          kubectl -n asterisk-demo patch secret alice-sip --type=merge -p '{"data":{"password":"cm90YXRlZA=="}}'
          for attempt in $(seq 1 18); do
            after="$(kubectl -n asterisk-demo get ast demo -o jsonpath='{.status.configHash}')"
            test "$before" != "$after" && exit 0
            sleep 5
          done
          exit 1
      - name: Verify owned-resource cleanup
        run: |
          kubectl -n asterisk-demo delete ast demo --wait=true
          for attempt in $(seq 1 30); do
            count="$(kubectl -n asterisk-demo get secret,configmap,service,statefulset \
              -l app.kubernetes.io/managed-by=kubevoip --no-headers 2>/dev/null | wc -l)"
            test "$count" -eq 0 && exit 0
            sleep 2
          done
          exit 1
      - name: Reconcile scalable platform
        run: |
          kubectl apply -f integration/platform.yaml
          kubectl -n kubevoip-platform wait --for=condition=Available deployment/postgres --timeout=180s
          kubectl -n kubevoip-platform wait --for=condition=Available deployment/home-rtpengine-0 deployment/home-rtpengine-1 --timeout=240s
          kubectl -n kubevoip-platform wait --for=condition=Ready pod -l app.kubernetes.io/name=asterisk-worker --timeout=240s
          kubectl -n kubevoip-platform wait --for=create deployment/home-sip-gateway --timeout=240s
          kubectl -n kubevoip-platform wait --for=condition=Available deployment/home-sip-gateway --timeout=240s
          for attempt in $(seq 1 30); do
            test "$(kubectl -n kubevoip-platform get sipuser daniel -o jsonpath='{.status.phase}')" = "Ready" && break
            sleep 5
          done
          test "$(kubectl -n kubevoip-platform get sipuser daniel -o jsonpath='{.status.phase}')" = "Ready"
          ! kubectl -n kubevoip-platform get configmaps -o yaml | grep -E 'integration-password|phone-password|provider-password|provider-user'
          ! kubectl -n kubevoip-platform get networkprofile,sipuser,siptrunk,callroute,mediarelay,asteriskpool,sipgateway -o yaml | grep -E 'integration-password|phone-password|provider-password|provider-user'
          ! kubectl -n kubevoip-platform logs deployment/kubevoip-kubevoip | grep -E 'integration-password|phone-password|provider-password|provider-user'
      - name: Register SIP user and complete platform Echo call
        run: |
          kubectl -n kubevoip-platform create configmap sipp-platform-scenarios \
            --from-file=integration/sipp-register.xml --from-file=integration/sipp-platform-echo.xml \
            --from-file=integration/sipp-phone.xml --from-file=integration/sipp-register-phone.xml \
            --from-file=integration/sipp-trunk-call.xml --from-file=integration/sipp-provider-digest.xml \
            --from-file=integration/sipp-outbound-provider-call.xml
          kubectl -n kubevoip-platform run sipp-register --restart=Never --image=kubevoip-sipp:test \
            --overrides='{"spec":{"containers":[{"name":"sipp-register","image":"kubevoip-sipp:test","imagePullPolicy":"IfNotPresent","args":["-sf","/scenario/sipp-register.xml","-s","daniel","home-sip-gateway","-m","1","-timeout","20s"],"volumeMounts":[{"name":"scenario","mountPath":"/scenario"}]}],"volumes":[{"name":"scenario","configMap":{"name":"sipp-platform-scenarios"}}]}}'
          kubectl -n kubevoip-platform wait --for=jsonpath='{.status.phase}'=Succeeded pod/sipp-register --timeout=60s
          kubectl -n kubevoip-platform run sipp-platform-echo --restart=Never --image=kubevoip-sipp:test \
            --overrides='{"spec":{"containers":[{"name":"sipp-platform-echo","image":"kubevoip-sipp:test","imagePullPolicy":"IfNotPresent","args":["-sf","/scenario/sipp-platform-echo.xml","-s","600","home-sip-gateway","-m","1","-timeout","30s"],"volumeMounts":[{"name":"scenario","mountPath":"/scenario"}]}],"volumes":[{"name":"scenario","configMap":{"name":"sipp-platform-scenarios"}}]}}'
          kubectl -n kubevoip-platform wait --for=jsonpath='{.status.phase}'=Succeeded pod/sipp-platform-echo --timeout=90s
      - name: Complete direct trusted-trunk to registered-phone call
        run: |
          kubectl -n kubevoip-platform run sipp-phone --restart=Never --image=kubevoip-sipp:test \
            --overrides='{"spec":{"containers":[{"name":"sipp-phone","image":"kubevoip-sipp:test","imagePullPolicy":"IfNotPresent","args":["-sf","/scenario/sipp-phone.xml","-i","0.0.0.0","-p","5060","-m","1","-timeout","240s"],"volumeMounts":[{"name":"scenario","mountPath":"/scenario"}]}],"volumes":[{"name":"scenario","configMap":{"name":"sipp-platform-scenarios"}}]}}'
          kubectl -n kubevoip-platform expose pod sipp-phone --port=5060 --protocol=UDP
          kubectl -n kubevoip-platform run sipp-register-phone --restart=Never --image=kubevoip-sipp:test \
            --overrides='{"spec":{"containers":[{"name":"sipp-register-phone","image":"kubevoip-sipp:test","imagePullPolicy":"IfNotPresent","args":["-sf","/scenario/sipp-register-phone.xml","-s","daniel","home-sip-gateway","-m","1","-timeout","30s"],"volumeMounts":[{"name":"scenario","mountPath":"/scenario"}]}],"volumes":[{"name":"scenario","configMap":{"name":"sipp-platform-scenarios"}}]}}'
          kubectl -n kubevoip-platform wait --for=jsonpath='{.status.phase}'=Succeeded pod/sipp-register-phone --timeout=60s
          kubectl -n kubevoip-platform run provider-primary --restart=Never --image=kubevoip-sipp:test \
            --overrides='{"spec":{"containers":[{"name":"provider-primary","image":"kubevoip-sipp:test","imagePullPolicy":"IfNotPresent","command":["sleep","300"],"volumeMounts":[{"name":"scenario","mountPath":"/scenario"}]}],"volumes":[{"name":"scenario","configMap":{"name":"sipp-platform-scenarios"}}]}}'
          kubectl -n kubevoip-platform wait --for=condition=Ready pod/provider-primary --timeout=60s
          trunk_ip="$(kubectl -n kubevoip-platform get pod provider-primary -o jsonpath='{.status.podIP}')"
          before="$(kubectl -n kubevoip-platform get deployment home-sip-gateway -o jsonpath='{.spec.template.metadata.annotations.kubevoip\.com/config-hash}')"
          kubectl -n kubevoip-platform patch siptrunk provider-primary --type=merge \
            -p "{\"spec\":{\"inbound\":{\"allowedSourceCidrs\":[\"${trunk_ip}/32\"]}}}"
          for attempt in $(seq 1 18); do
            after="$(kubectl -n kubevoip-platform get deployment home-sip-gateway -o jsonpath='{.spec.template.metadata.annotations.kubevoip\.com/config-hash}')"
            test "$before" != "$after" && break
            sleep 5
          done
          test "$before" != "$after"
          kubectl -n kubevoip-platform rollout status deployment/home-sip-gateway --timeout=180s
          kubectl -n kubevoip-platform exec provider-primary -- \
            sipp -sf /scenario/sipp-trunk-call.xml -s 100 home-sip-gateway -m 1 -timeout 30s
          kubectl -n kubevoip-platform delete pod/sipp-phone service/sipp-phone pod/provider-primary --ignore-not-found
      - name: Complete outbound digest-authenticated provider call
        run: |
          kubectl -n kubevoip-platform run provider-primary --restart=Never --image=kubevoip-sipp:test \
            --overrides='{"spec":{"containers":[{"name":"provider-primary","image":"kubevoip-sipp:test","imagePullPolicy":"IfNotPresent","args":["-sf","/scenario/sipp-provider-digest.xml","-i","0.0.0.0","-p","5060","-m","1","-timeout","240s"],"volumeMounts":[{"name":"scenario","mountPath":"/scenario"}]}],"volumes":[{"name":"scenario","configMap":{"name":"sipp-platform-scenarios"}}]}}'
          kubectl -n kubevoip-platform expose pod provider-primary --port=5060 --protocol=UDP
          kubectl -n kubevoip-platform wait --for=condition=Ready pod/provider-primary --timeout=60s
          kubectl -n kubevoip-platform run sipp-outbound-provider --restart=Never --image=kubevoip-sipp:test \
            --overrides='{"spec":{"containers":[{"name":"sipp","image":"kubevoip-sipp:test","imagePullPolicy":"IfNotPresent","args":["-sf","/scenario/sipp-outbound-provider-call.xml","-s","+61200000000","home-sip-gateway","-m","1","-timeout","60s"],"volumeMounts":[{"name":"scenario","mountPath":"/scenario"}]}],"volumes":[{"name":"scenario","configMap":{"name":"sipp-platform-scenarios"}}]}}'
          kubectl -n kubevoip-platform wait --for=jsonpath='{.status.phase}'=Succeeded pod/sipp-outbound-provider --timeout=120s
          kubectl -n kubevoip-platform wait --for=jsonpath='{.status.phase}'=Succeeded pod/provider-primary --timeout=120s
          kubectl -n kubevoip-platform delete pod/provider-primary service/provider-primary pod/sipp-outbound-provider --ignore-not-found
      - name: Verify new calls survive replica replacement
        run: |
          kamailio_pod="$(kubectl -n kubevoip-platform get pod -l app.kubernetes.io/name=kamailio -o jsonpath='{.items[0].metadata.name}')"
          kubectl -n kubevoip-platform delete pod "${kamailio_pod}" --wait=false
          kubectl -n kubevoip-platform rollout status deployment/home-sip-gateway --timeout=180s
          kubectl -n kubevoip-platform run sipp-after-kamailio-replacement --restart=Never --image=kubevoip-sipp:test \
            --overrides='{"spec":{"containers":[{"name":"sipp","image":"kubevoip-sipp:test","imagePullPolicy":"IfNotPresent","args":["-sf","/scenario/sipp-platform-echo.xml","-s","600","home-sip-gateway","-m","1","-timeout","30s"],"volumeMounts":[{"name":"scenario","mountPath":"/scenario"}]}],"volumes":[{"name":"scenario","configMap":{"name":"sipp-platform-scenarios"}}]}}'
          kubectl -n kubevoip-platform wait --for=jsonpath='{.status.phase}'=Succeeded pod/sipp-after-kamailio-replacement --timeout=90s
          old_asterisk_uid="$(kubectl -n kubevoip-platform get pod applications-asterisk-pool-0 -o jsonpath='{.metadata.uid}')"
          kubectl -n kubevoip-platform delete pod applications-asterisk-pool-0 --wait=false
          for attempt in $(seq 1 60); do
            new_asterisk_uid="$(kubectl -n kubevoip-platform get pod applications-asterisk-pool-0 -o jsonpath='{.metadata.uid}' 2>/dev/null || true)"
            ready="$(kubectl -n kubevoip-platform get pod applications-asterisk-pool-0 -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)"
            test -n "$new_asterisk_uid" && test "$new_asterisk_uid" != "$old_asterisk_uid" && test "$ready" = "True" && break
            sleep 3
          done
          test "$new_asterisk_uid" != "$old_asterisk_uid"
          test "$ready" = "True"
          kubectl -n kubevoip-platform run sipp-after-asterisk-replacement --restart=Never --image=kubevoip-sipp:test \
            --overrides='{"spec":{"containers":[{"name":"sipp","image":"kubevoip-sipp:test","imagePullPolicy":"IfNotPresent","args":["-sf","/scenario/sipp-platform-echo.xml","-s","600","home-sip-gateway","-m","1","-timeout","30s"],"volumeMounts":[{"name":"scenario","mountPath":"/scenario"}]}],"volumes":[{"name":"scenario","configMap":{"name":"sipp-platform-scenarios"}}]}}'
          kubectl -n kubevoip-platform wait --for=jsonpath='{.status.phase}'=Succeeded pod/sipp-after-asterisk-replacement --timeout=90s
      - name: Reconfigure resolved external address
        run: |
          before="$(kubectl -n kubevoip-platform get deployment home-sip-gateway -o jsonpath='{.spec.template.metadata.annotations.kubevoip\.com/config-hash}')"
          kubectl -n kubevoip-platform patch networkprofile public --type=merge -p '{"spec":{"externalAddress":{"value":"203.0.113.50"}}}'
          for attempt in $(seq 1 18); do
            after="$(kubectl -n kubevoip-platform get deployment home-sip-gateway -o jsonpath='{.spec.template.metadata.annotations.kubevoip\.com/config-hash}')"
            test "$before" != "$after" && break
            sleep 5
          done
          test "$before" != "$after"
          test "$(kubectl -n kubevoip-platform get sipgateway home -o jsonpath='{.status.resolvedAddress}')" = "203.0.113.50"
          kubectl -n kubevoip-platform patch networkprofile public --type=json -p='[{"op":"remove","path":"/spec/externalAddress/value"}]'
      - name: Verify platform cleanup
        run: |
          kubectl -n kubevoip-platform delete sipuser daniel --wait=true
          test "$(kubectl -n kubevoip-platform exec deployment/postgres -- psql -U kubevoip -d kubevoip -Atc 'select count(*) from subscriber;')" = "0"
          kubectl -n kubevoip-platform delete callroute/user-100 callroute/echo callroute/outbound-provider siptrunk/provider-primary --wait=true
          kubectl -n kubevoip-platform delete sipgateway/home mediarelay/home asteriskpool/applications --wait=true
          for attempt in $(seq 1 30); do
            count="$(kubectl -n kubevoip-platform get secret,configmap,service,deployment,statefulset \
              -l app.kubernetes.io/managed-by=kubevoip --no-headers 2>/dev/null | wc -l)"
            test "$count" -eq 0 && exit 0
            sleep 2
          done
          exit 1
      - name: Diagnostics
        if: failure()
        run: |
          kubectl -n asterisk-demo get ast,pods,services -o wide || true
          kubectl -n asterisk-demo logs statefulset/demo-asterisk || true
          kubectl -n asterisk-demo logs deployment/kubevoip-kubevoip || true
          kubectl -n kubevoip-platform get networkprofile,sipuser,siptrunk,callroute,mediarelay,asteriskpool,sipgateway,pods,services -o wide || true
          kubectl -n kubevoip-platform get endpoints,endpointslices -o wide || true
          kubectl -n kubevoip-platform describe pod/sipp-after-asterisk-replacement || true
          kubectl -n kubevoip-platform logs pod/sipp-after-asterisk-replacement || true
          kubectl -n kubevoip-platform logs pod/sipp-after-kamailio-replacement || true
          kubectl -n kubevoip-platform logs pod/sipp-platform-echo || true
          kubectl -n kubevoip-platform logs deployment/kubevoip-kubevoip || true
          kubectl -n kubevoip-platform logs deployment/home-sip-gateway || true
          kubectl -n kubevoip-platform logs statefulset/applications-asterisk-pool || true
          kubectl -n kubevoip-platform logs statefulset/applications-asterisk-pool --previous || true
          kubectl -n kubevoip-platform logs deployment/home-rtpengine-0 || true
