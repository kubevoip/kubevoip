apiVersion: v1
kind: Namespace
metadata:
  name: kubevoip-platform
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-app
  namespace: kubevoip-platform
type: Opaque
stringData:
  host: postgres
  port: "5432"
  dbname: kubevoip
  user: kubevoip
  password: integration-password
---
apiVersion: v1
kind: Secret
metadata:
  name: daniel-sip
  namespace: kubevoip-platform
type: Opaque
stringData:
  password: phone-password
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kubevoip-platform
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kubevoip-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - {name: POSTGRES_DB, value: kubevoip}
            - {name: POSTGRES_USER, value: kubevoip}
            - {name: POSTGRES_PASSWORD, value: integration-password}
          ports:
            - {containerPort: 5432}
          readinessProbe:
            exec:
              command: [pg_isready, -U, kubevoip]
---
apiVersion: kubevoip.com/v1alpha1
kind: NetworkProfile
metadata:
  name: public
  namespace: kubevoip-platform
spec:
  externalAddress:
    source: Service
  localNetworks:
    - 10.0.0.0/8
---
apiVersion: kubevoip.com/v1alpha1
kind: MediaRelay
metadata:
  name: home
  namespace: kubevoip-platform
spec:
  replicas: 2
  networkProfileRef:
    name: public
  media:
    start: 20000
    end: 20099
---
apiVersion: kubevoip.com/v1alpha1
kind: AsteriskPool
metadata:
  name: applications
  namespace: kubevoip-platform
spec:
  replicas: 2
  applications:
    echoExtension: "600"
---
apiVersion: kubevoip.com/v1alpha1
kind: SIPGateway
metadata:
  name: home
  namespace: kubevoip-platform
spec:
  replicas: 2
  databaseSecretRef:
    name: postgres-app
  networkProfileRef:
    name: public
  mediaRelayRef:
    name: home
  trunks:
    - name: integration-trunk
      terminationUri: integration-trunk
      authentication:
        mode: IP
  routes:
    - match:
        calledNumber: "100"
      target:
        sipUserRef: daniel
    - match:
        calledNumber: "600"
      target:
        asteriskPoolRef: applications
        extension: "600"
    - match:
        calledNumber: "+61..."
      target:
        trunkRef: integration-trunk
---
apiVersion: kubevoip.com/v1alpha1
kind: SIPUser
metadata:
  name: daniel
  namespace: kubevoip-platform
spec:
  gatewayRef:
    name: home
  extension: "100"
  authUsername: daniel
  callerId: Daniel <100>
  passwordSecretRef:
    name: daniel-sip
    key: password
