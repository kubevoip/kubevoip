---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: networkprofiles.kubevoip.com
spec:
  group: kubevoip.com
  scope: Namespaced
  names:
    plural: networkprofiles
    singular: networkprofile
    kind: NetworkProfile
    shortNames:
    - netprofile
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              externalAddress:
                type: object
                properties:
                  value:
                    type: string
                    minLength: 1
                    maxLength: 253
                  source:
                    type: string
                    enum:
                    - Service
                x-kubernetes-validations:
                - rule: has(self.value) || has(self.source)
                  message: value or source is required
              localNetworks:
                type: array
                items:
                  type: string
            required:
            - externalAddress
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
        required:
        - spec
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sipusers.kubevoip.com
spec:
  group: kubevoip.com
  scope: Namespaced
  names:
    plural: sipusers
    singular: sipuser
    kind: SIPUser
    shortNames:
    - sipuser
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
