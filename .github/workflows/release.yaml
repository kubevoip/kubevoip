name: Release
on:
  push:
    tags: ["v*.*.*"]
permissions:
  contents: write
  packages: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --extra dev
      - run: uv run ruff check . && uv run pytest
      - uses: azure/setup-helm@v5
      - run: helm lint charts/kubevoip && helm template kubevoip charts/kubevoip >/dev/null
      - name: Validate CRD on Kubernetes
        uses: helm/kind-action@v1
      - run: kubectl apply --dry-run=server -f config/crd/asterisk-crd.yaml -f config/crd/platform-crds.yaml
      - run: scripts/check-versions.sh "${GITHUB_REF_NAME}"
      - name: Verify release paths
        run: |
          if git grep '<'"owner"'>'; then
            echo "owner placeholders remain" >&2
            exit 1
          fi
          test "${GITHUB_REPOSITORY_OWNER}" = "danohn"

  build-images:
    name: build ${{ matrix.image }} (${{ matrix.platform }})
    needs: validate
    strategy:
      matrix:
        include:
          - image: kubevoip
            file: Dockerfile
            runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - image: kubevoip
            file: Dockerfile
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
          - image: kubevoip-asterisk
            file: runtime/Dockerfile
            runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - image: kubevoip-asterisk
            file: runtime/Dockerfile
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
          - image: kubevoip-asterisk-worker
            file: runtime/Dockerfile
            runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - image: kubevoip-asterisk-worker
            file: runtime/Dockerfile
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
          - image: kubevoip-kamailio
            file: runtime/kamailio/Dockerfile
            runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - image: kubevoip-kamailio
            file: runtime/kamailio/Dockerfile
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
          - image: kubevoip-rtpengine
            file: runtime/rtpengine/Dockerfile
            runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - image: kubevoip-rtpengine
            file: runtime/rtpengine/Dockerfile
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/danohn/${{ matrix.image }}:${{ github.ref_name }}-${{ matrix.arch }}
          cache-from: type=gha,scope=release-${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,scope=release-${{ matrix.image }}-${{ matrix.arch }},mode=max

  publish:
    needs: [validate, build-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-architecture image manifests
        run: |
          for image in kubevoip kubevoip-asterisk kubevoip-asterisk-worker kubevoip-kamailio kubevoip-rtpengine; do
            docker buildx imagetools create \
              --tag "ghcr.io/danohn/${image}:${GITHUB_REF_NAME}" \
              "ghcr.io/danohn/${image}:${GITHUB_REF_NAME}-amd64" \
              "ghcr.io/danohn/${image}:${GITHUB_REF_NAME}-arm64"
          done
      - uses: azure/setup-helm@v5
      - run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package charts/kubevoip
          helm push "kubevoip-${GITHUB_REF_NAME#v}.tgz" oci://ghcr.io/danohn/charts
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v heading="## [$version]" '$0 == heading {found=1; next} /^## \[/ {found=0} found' CHANGELOG.md > release-notes.md
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
