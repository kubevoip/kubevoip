                maxLength: 40
              callerId:
                type: string
                maxLength: 80
              passwordSecretRef:
                type: object
                properties:
                  name: *id001
                  key: *id001
                required:
                - name
                - key
            required:
            - gatewayRef
            - extension
            - authUsername
            - passwordSecretRef
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
        required:
        - spec
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mediarelays.kubevoip.com
spec:
  group: kubevoip.com
  scope: Namespaced
  names:
    plural: mediarelays
    singular: mediarelay
    kind: MediaRelay
    shortNames:
    - relay
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              replicas:
                type: integer
                minimum: 1
                maximum: 32
                default: 1
              image: &id001
                type: string
                minLength: 1
              networkProfileRef:
                type: object
                properties:
                  name: *id001
                required:
                - name
              media:
                type: object
                properties:
                  start:
                    type: integer
                    minimum: 1
                    maximum: 65535
                  end:
                    type: integer
                    minimum: 1
                    maximum: 65535
                required:
                - start
                - end
                x-kubernetes-validations:
                - rule: self.start <= self.end
                  message: start must not exceed end
                - rule: self.end - self.start < 2000
                  message: media range cannot exceed 2000 ports
              network:
                type: object
                properties:
                  mode:
                    type: string
                    enum:
                    - Service
                    - HostNetwork
                    default: Service
                  externalAddress: &id002
                    type: string
                    minLength: 1
                    maxLength: 253
                  service:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - ClusterIP
                        - LoadBalancer
                        default: ClusterIP
                      externalTrafficPolicy:
                        type: string
                        enum:
                        - Cluster
                        - Local
                        default: Cluster
                      annotations:
                        type: object
                        additionalProperties:
                          type: string
                  replicaOverrides:
                    type: array
                    items:
                      type: object
                      properties:
                        replica:
                          type: integer
                          minimum: 0
                        externalAddress: *id002
                      required:
                      - replica
                      - externalAddress
                    x-kubernetes-list-type: map
                    x-kubernetes-list-map-keys:
                    - replica
            required:
            - networkProfileRef
            - media
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
        required:
        - spec
---
