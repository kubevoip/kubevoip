name: Test
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest
      - uses: azure/setup-helm@v5
      - run: helm lint charts/kubevoip
      - run: helm template kubevoip charts/kubevoip >/dev/null
      - name: Verify namespace-scoped chart resources
        run: |
          helm template kubevoip charts/kubevoip --namespace telephony > /tmp/kubevoip.yaml
          grep -q '^kind: Role$' /tmp/kubevoip.yaml
          grep -q '^kind: RoleBinding$' /tmp/kubevoip.yaml
          grep -q '^kind: ClusterRole$' /tmp/kubevoip.yaml
          grep -q '^kind: ClusterRoleBinding$' /tmp/kubevoip.yaml
          grep -Fq 'resources: ["namespaces"]' /tmp/kubevoip.yaml
          grep -Fq 'resources: ["customresourcedefinitions"]' /tmp/kubevoip.yaml
          grep -q -- '--namespace=telephony' /tmp/kubevoip.yaml
      - name: Validate CRD on Kubernetes
        uses: helm/kind-action@v1
      - run: kubectl apply --dry-run=server -f config/crd/platform-crds.yaml
      - run: kubectl apply -f config/crd/platform-crds.yaml
      - run: kubectl apply -f examples/namespace.yaml && kubectl create namespace kubevoip-platform && kubectl create namespace telephony
      - run: kubectl apply --dry-run=server -f examples/platform.yaml -f examples/quickstart-two-phones.yaml -f integration/platform.yaml
  containers:
    name: containers (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          tags: kubevoip:test
          cache-from: type=gha,scope=kubevoip-${{ matrix.arch }}
          cache-to: type=gha,scope=kubevoip-${{ matrix.arch }},mode=max
