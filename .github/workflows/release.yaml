name: Release
on:
  push:
    tags: ["v*.*.*"]
permissions:
  contents: write
  packages: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --extra dev
      - run: uv run ruff check . && uv run pytest
      - name: Validate CRD on Kubernetes
        uses: helm/kind-action@v1
      - run: kubectl apply --dry-run=server -f config/crd/platform-crds.yaml
      - run: scripts/check-versions.sh "${GITHUB_REF_NAME}"
      - name: Verify release paths
        run: |
          if git grep '<'"owner"'>'; then
            echo "owner placeholders remain" >&2
            exit 1
          fi
          test "${GITHUB_REPOSITORY_OWNER}" = "kubevoip"

  build-images:
    name: build ${{ matrix.image }} (${{ matrix.platform }})
    needs: validate
    strategy:
      matrix:
        include:
          - image: kubevoip
            file: Dockerfile
            runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - image: kubevoip
            file: Dockerfile
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/kubevoip/${{ matrix.image }}:${{ github.ref_name }}-${{ matrix.arch }}
          no-cache: ${{ matrix.image == 'kubevoip' }}
          cache-from: type=gha,scope=release-${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,scope=release-${{ matrix.image }}-${{ matrix.arch }},mode=max
      - name: Verify operator image contents
        if: matrix.image == 'kubevoip'
        run: |
          docker run --rm --entrypoint python "ghcr.io/kubevoip/kubevoip:${GITHUB_REF_NAME}-${{ matrix.arch }}" -c '
          import inspect
          import kubevoip.platform_resources as resources

          source = inspect.getsource(resources.build_asterisk_pool_resources)
          if "headless_name" not in source or "return [secret, service, headless, statefulset]" not in source:
              raise SystemExit("operator image does not contain the expected AsteriskPool service split")
          '

  publish:
    needs: [validate, build-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-architecture image manifests
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/kubevoip/kubevoip:${GITHUB_REF_NAME}" \
            "ghcr.io/kubevoip/kubevoip:${GITHUB_REF_NAME}-amd64" \
            "ghcr.io/kubevoip/kubevoip:${GITHUB_REF_NAME}-arm64"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v heading="## [$version]" '$0 == heading {found=1; next} /^## \[/ {found=0} found' CHANGELOG.md > release-notes.md
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
          fi
      - name: Check charts app credentials
        id: charts-app
        env:
          CHARTS_APP_ID: ${{ secrets.CHARTS_APP_ID }}
          CHARTS_APP_PRIVATE_KEY: ${{ secrets.CHARTS_APP_PRIVATE_KEY }}
        run: |
          if [ -n "${CHARTS_APP_ID}" ] && [ -n "${CHARTS_APP_PRIVATE_KEY}" ]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "CHARTS_APP_ID or CHARTS_APP_PRIVATE_KEY is not configured; skipping chart repo dispatch."
          fi
      - name: Create charts app token
        id: charts-token
        if: steps.charts-app.outputs.configured == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CHARTS_APP_ID }}
          private-key: ${{ secrets.CHARTS_APP_PRIVATE_KEY }}
          owner: kubevoip
          repositories: charts
      - name: Trigger chart bump PR
        if: steps.charts-app.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ steps.charts-token.outputs.token }}
        run: |
          cat > /tmp/charts-dispatch.json <<JSON
          {
            "event_type": "platform-release",
            "client_payload": {
              "ref": "${GITHUB_REF_NAME}",
              "version": "${GITHUB_REF_NAME}"
            }
          }
          JSON
          gh api repos/kubevoip/charts/dispatches --method POST --input /tmp/charts-dispatch.json
      - name: Trigger docs reference refresh
        env:
          GH_TOKEN: ${{ secrets.DOCS_WORKFLOW_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "DOCS_WORKFLOW_TOKEN is not configured; skipping docs refresh dispatch."
            exit 0
          fi
          cat > /tmp/docs-dispatch.json <<JSON
          {
            "event_type": "platform-release",
            "client_payload": {
              "ref": "${GITHUB_REF_NAME}",
              "version": "${GITHUB_REF_NAME}"
            }
          }
          JSON
          gh api repos/kubevoip/docs/dispatches --method POST --input /tmp/docs-dispatch.json
