name: Test
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest
      - uses: azure/setup-helm@v5
      - run: helm lint charts/kubevoip
      - run: helm template kubevoip charts/kubevoip >/dev/null
      - name: Validate CRD on Kubernetes
        uses: helm/kind-action@v1
      - run: kubectl apply --dry-run=server -f config/crd/asterisk-crd.yaml -f config/crd/platform-crds.yaml
      - run: kubectl apply -f config/crd/asterisk-crd.yaml -f config/crd/platform-crds.yaml
      - run: kubectl apply -f examples/namespace.yaml && kubectl create namespace kubevoip-platform
      - run: kubectl apply --dry-run=server -f examples/platform.yaml -f integration/platform.yaml
  containers:
    name: containers (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          tags: kubevoip:test
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: runtime/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: kubevoip-asterisk:test
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: runtime/kamailio/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: kubevoip-kamailio:test
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: runtime/rtpengine/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: kubevoip-rtpengine:test
