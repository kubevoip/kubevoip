---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sipgateways.kubevoip.com
spec:
  group: kubevoip.com
  scope: Namespaced
  names:
    plural: sipgateways
    singular: sipgateway
    kind: SIPGateway
    shortNames:
    - sipgw
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              replicas:
                type: integer
                minimum: 1
                maximum: 32
                default: 1
              image: &id001
                type: string
                minLength: 1
              databaseSecretRef: &id002
                type: object
                properties:
                  name: *id001
                required:
                - name
              networkProfileRef: *id002
              mediaRelayRef: *id002
              externalAddress:
                type: string
                minLength: 1
                maxLength: 253
              service:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                    - ClusterIP
                    - LoadBalancer
                    default: ClusterIP
                  externalTrafficPolicy:
                    type: string
                    enum:
                    - Cluster
                    - Local
                    default: Cluster
                  annotations:
                    type: object
                    additionalProperties:
                      type: string
              trunks:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      pattern: ^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?$
                      maxLength: 40
                    terminationUri: *id001
                    authentication:
                      type: object
                      properties:
                        mode:
                          type: string
                          enum:
                          - IP
                          default: IP
                    allowedSourceCidrs:
                      type: array
                      items:
                        type: string
                  required:
                  - name
                  - terminationUri
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys:
                - name
              routes:
                type: array
                items:
                  type: object
                  properties:
                    match:
                      type: object
                      properties:
                        calledNumber:
                          type: string
                          pattern: ^[+0-9.*]+$
                          maxLength: 64
                      required:
                      - calledNumber
                    target:
                      type: object
                      properties:
                        sipUserRef: *id001
                        asteriskPoolRef: *id001
                        trunkRef: *id001
                        extension:
                          type: string
                          pattern: ^[0-9]+$
                      x-kubernetes-validations:
                      - rule: '(has(self.sipUserRef) ? 1 : 0) + (has(self.asteriskPoolRef)
                          ? 1 : 0) + (has(self.trunkRef) ? 1 : 0) == 1'
                        message: exactly one route target is required
                      - rule: '!has(self.asteriskPoolRef) || has(self.extension)'
                        message: Asterisk pool routes require extension
                  required:
                  - match
                  - target
            required:
            - databaseSecretRef
            - networkProfileRef
            - mediaRelayRef
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
        required:
        - spec
