name: Release
on:
  push:
    tags: ["v*.*.*"]
permissions:
  contents: write
  packages: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --extra dev
      - run: uv run ruff check . && uv run pytest
      - uses: azure/setup-helm@v5
      - run: helm lint charts/kubevoip && helm template kubevoip charts/kubevoip >/dev/null
      - name: Validate CRD on Kubernetes
        uses: helm/kind-action@v1
      - run: kubectl apply --dry-run=server -f config/crd/asterisk-crd.yaml
      - run: scripts/check-versions.sh "${GITHUB_REF_NAME}"
      - name: Verify release paths
        run: |
          if git grep '<owner>'; then
            echo "owner placeholders remain" >&2
            exit 1
          fi
          test "${GITHUB_REPOSITORY_OWNER}" = "danohn"
      - uses: docker/setup-qemu-action@v4.1.0
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/danohn/kubevoip:${{ github.ref_name }}
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/danohn/kubevoip-asterisk:${{ github.ref_name }}
      - run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package charts/kubevoip
          helm push "kubevoip-${GITHUB_REF_NAME#v}.tgz" oci://ghcr.io/danohn/charts
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          awk '/^## \[0.1.0\]/{found=1; next} /^## \[/{found=0} found' CHANGELOG.md > release-notes.md
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
